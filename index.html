<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Trouve Ta Table - Notre Mariage / Trova Il Tuo Tavolo - Il Nostro Matrimonio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f6f0; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 420px; text-align: center; position: relative; border: 1px solid #eee; }
        h1 { color: #4a4a4a; font-size: 26px; font-family: 'Georgia', serif; margin-bottom: 5px; }
        .subtitle { color: #8a8a8a; font-style: italic; margin-bottom: 20px; }
        .couple-photo { width: 100%; max-height: 250px; object-fit: cover; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; transition: all 0.3s; }
        input:focus { border-color: #d4af37; outline: none; box-shadow: 0 0 5px rgba(212, 175, 55, 0.5); }
        button { background-color: #d4af37; color: white; border: none; font-weight: bold; cursor: pointer; letter-spacing: 1px; }
        button:hover { background-color: #aa8c2c; }
        .result { margin-top: 25px; font-size: 18px; color: #333; text-align: left; }
        .single-match { text-align: center; font-family: 'Georgia', serif; font-size: 22px; }
        .table-name { color: #d4af37; font-size: 26px; display: block; margin-top: 5px; font-weight: bold; margin-bottom: 15px; }
        .loading { font-size: 14px; color: #8a8a8a; text-align: center; display: block; margin-top: 10px; }
        .match-item { background: #fdfbf7; padding: 12px; margin: 8px 0; border-radius: 8px; border-left: 4px solid #d4af37; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .match-name { font-weight: bold; color: #4a4a4a; }
        .match-table { color: #aa8c2c; font-style: italic; font-size: 15px; text-align: right; }
        .multi-title { font-size: 16px; color: #666; margin-bottom: 10px; font-style: italic; text-align: center; }
        
        /* Styles pour les compagnons de table */
        .guests-together { margin-top: 20px; border-top: 1px dashed #ddd; padding-top: 15px; text-align: left; }
        .guests-together-title { font-size: 15px; font-weight: bold; color: #555; text-align: center; margin-bottom: 10px; font-family: sans-serif; line-height: 1.4; }
        .guest-chip { display: inline-block; background: #f1ede4; color: #555; padding: 6px 12px; margin: 4px; border-radius: 20px; font-size: 14px; font-family: sans-serif; }
    </style>
</head>
<body>

<div class="container">
    <h1>Bienvenue à notre Mariage<br><span style="font-size: 18px; font-family: sans-serif; color: #8a8a8a;">Benvenuti al nostro Matrimonio</span></h1>
    <div class="subtitle">Trouvez votre table / Trova il tuo tavolo</div>
    
    <img class="couple-photo" id="photo-couple" src="" alt="Notre Couple">

    <input type="text" id="search-lastname" placeholder="Votre Nom / Cognome">
    <input type="text" id="search-firstname" placeholder="Votre Prénom / Nome">
    <button onclick="rechercherTable()">Rechercher ma table / Cerca il mio tavolo</button>
    <div class="result" id="resultat"></div>
</div>

<script>
    const GOOGLE_SHEETS_ID = "1oMpUNFcGBVIGvh8FdXMAyaVMXiI6Is7t1DWOuJiP6vQ";
    const GOOGLE_DRIVE_PHOTO_ID = "1q9Brj02X1sijVFzOFro60M6gu1a9oJO-";

    document.getElementById('photo-couple').src = `https://drive.google.com/thumbnail?sz=w1000&id=${GOOGLE_DRIVE_PHOTO_ID}`;

    // Correction de la variable "texte" pour éviter le blocage du bouton
    function nettoyerTexte(texte) {
        if (!texte) return "";
        return texte.toLowerCase().trim().replace(/\s+/g, '').replace(/-/g, '');
    }

    function harmoniserNom(nom) {
        if (!nom) return "";
        return nom.toUpperCase().trim();
    }

    function harmoniserPrenom(prenom) {
        if (!prenom) return "";
        return prenom.trim().toLowerCase().replace(/(?:^|\s|-)\S/g, function(a) {
            return a.toUpperCase();
        });
    }

    function parseCSVLine(text) {
        let columns = [];
        let curVal = "";
        let inQuotes = false;
        
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                columns.push(curVal.trim());
                curVal = "";
            } else {
                curVal += char;
            }
        }
        columns.push(curVal.trim());
        return columns;
    }

    async function rechercherTable() {
        const prenomSaisi = nettoyerTexte(document.getElementById('search-firstname').value);
        const nomSaisi = nettoyerTexte(document.getElementById('search-lastname').value);
        const divResultat = document.getElementById('resultat');
        
        if(!prenomSaisi && !nomSaisi) {
            divResultat.innerHTML = "<div style='color:#e74c3c; font-size:16px; text-align:center;'>Veuillez entrer un nom ou un prénom. / Per favore, inserisci un cognome o un nome.</div>";
            return;
        }

        divResultat.innerHTML = "<span class='loading'>Recherche en cours... / Ricerca in corso...</span>";

        const cacheBuster = new Date().getTime();
        // URL nettoyée de manière stricte pour l'export au format CSV direct
        const url = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEETS_ID}/export?format=csv&gid=0&t=${cacheBuster}`;

        try {
            const response = await fetch(url);
            const data = await response.text();
            const lignes = data.split(/\r?\n/);
            
            const indexNom = 4;    
            const indexPrenom = 5; 
            const indexTable = 10; 
            
            let correspondances = [];
            let tousLesInvites = [];

            for(let i = 1; i < lignes.length; i++) {
                let ligneTexte = lignes[i].trim();
                if (!ligneTexte) continue;

                const colonnes = parseCSVLine(ligneTexte);
                
                let nomExcel = colonnes[indexNom] ? colonnes[indexNom].trim() : "";
                let prenomExcel = colonnes[indexPrenom] ? colonnes[indexPrenom].trim() : "";
                let tableTrouvee = colonnes[indexTable] ? colonnes[indexTable].trim() : "";

                if (colonnes.length <= indexTable) {
                    continue;
                }

                if (!tableTrouvee || tableTrouvee.toLowerCase() === "undefined" || tableTrouvee === "") {
                    continue;
                }

                let nomExcelNettoye = nettoyerTexte(nomExcel);
                let prenomExcelNettoye = nettoyerTexte(prenomExcel);

                let nomPropre = harmoniserNom(nomExcel);
                let prenomPropre = harmoniserPrenom(prenomExcel);

                tousLesInvites.push({ prenom: prenomPropre, nom: nomPropre, table: tableTrouvee, pNettoye: prenomExcelNettoye, nNettoye: nomExcelNettoye });

                let matchPrenom = prenomSaisi ? (prenomExcelNettoye === prenomSaisi) : true;
                let matchNom = nomSaisi ? (nomExcelNettoye === nomSaisi || nomExcelNettoye.includes(nomSaisi)) : true;

                if (matchPrenom && matchNom) {
                    correspondances.push({ prenom: prenomPropre, nom: nomPropre, table: tableTrouvee, pNettoye: prenomExcelNettoye, nNettoye: nomExcelNettoye });
                }
            }

            if (correspondances.length === 0) {
                divResultat.innerHTML = "<div style='text-align:center;'>❌ Aucun invité trouvé. / Nessun ospite trovato.</div>";
            } 
            else if (correspondances.length === 1) {
                let cible = correspondances[0];
                
                let compagnons = tousLesInvites.filter(inv => 
                    inv.table === cible.table && 
                    !(inv.pNettoye === cible.pNettoye && inv.nNettoye === cible.nNettoye)
                );

                let htmlCompagnons = "";
                if (compagnons.length > 0) {
                    htmlCompagnons = `
                        <div class="guests-together">
                            <div class="guests-together-title">
                                Vous êtes à la même table que :<br>
                                Siete al tavolo con :
                            </div>
                            <div style="text-align: center;">
                    `;
                    compagnons.forEach(c => {
                        htmlCompagnons += `<span class="guest-chip">${c.nom} ${c.prenom}</span>`;
                    });
                    htmlCompagnons += `</div></div>`;
                }

                divResultat.innerHTML = `
                    <div class="single-match">
                        ✨ ${cible.nom} ${cible.prenom},<br> vous êtes à la table : / siete al tavolo :
                        <span class="table-name">${cible.table}</span>
                    </div>
                    ${htmlCompagnons}`;
            } 
            else {
                let htmlListe = `<div class="multi-title">💬 Plusieurs correspondances trouvées : / Più corrispondenze trovate :</div>`;
                correspondances.forEach(invite => {
                    htmlListe += `
                        <div class="match-item">
                            <span class="match-name">${invite.nom} ${invite.prenom}</span>
                            <span class="match-table">➔ Table : ${invite.table} / Tavolo : ${invite.table}</span>
                        </div>`;
                });
                divResultat.innerHTML = htmlListe;
            }

        } catch (error) {
            console.error(error);
            divResultat.innerHTML = "<span style='color:#e74c3c; font-size:16px;'>Erreur d'accès au fichier.</span>";
        }
    }
</script>
</body>
</html>
